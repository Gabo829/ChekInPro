<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro Ingreso/Salida</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
  <div class="container">
    <h1>Registro de Ingreso y Salida</h1>
    <div class="buttons">
      <button id="ingreso">Ingreso</button>
      <button id="salida">Salida</button>
    </div>
    <div class="logs">
      <div class="log">
        <h2>Último Ingreso</h2>
        <p id="ingresoTime">—</p>
      </div>
      <div class="log">
        <h2>Última Salida</h2>
        <p id="salidaTime">—</p>
      </div>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
